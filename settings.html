<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('solfai_theme');
                if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
                var color = localStorage.getItem('solfai_color');
                if (color && color !== 'default') document.documentElement.setAttribute('data-color', color);
                var fontSize = localStorage.getItem('solfai_font_size') || 'md';
                document.documentElement.setAttribute('data-font-size', fontSize);
            } catch (e) {}
        })();
    </script>                
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://accounts.google.com https://accounts.google.com/gsi/client; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com https://accounts.google.com/gsi/; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleusercontent.com https://lh3.googleusercontent.com; connect-src 'self' https://solf-ai-api.mlemonw.workers.dev https://cdn.jsdelivr.net https://accounts.google.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self';">
    <title>Solf.ai — Settings</title>
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png?v=8">
    <link rel="icon" href="favicon.ico?v=8" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=8">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png?v=8">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Solf.ai">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .settings-page {
            min-height: 100dvh;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 18px 14px 28px;
        }
        .settings-shell {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
            min-height: 42px;
        }
        .settings-back {
            position: absolute;
            left: 0;
            width: 38px;
            height: 38px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .settings-back:hover {
            border-color: var(--purple-soft);
            transform: translateX(-1px);
        }
        .settings-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0;
        }
        .settings-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            margin-bottom: 16px;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .settings-user:hover {
            border-color: var(--purple-soft);
            background: var(--accent-bg-05);
        }
        .settings-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--accent-gradient);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-avatar.has-mark {
            background: #e4e4e7;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
        }
        [data-theme="light"] .settings-avatar.has-mark {
            background: #f4f4f5;
        }
        .settings-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .settings-avatar.has-mark img.settings-logo-mark {
            width: 86%;
            height: 86%;
            object-fit: contain;
        }
        .settings-user-name {
            font-size: 1.25rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .settings-user-more {
            color: var(--text-secondary);
            letter-spacing: 2px;
            font-size: 20px;
        }
        .settings-block-title {
            margin: 16px 8px 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .settings-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 26px rgba(0, 0, 0, 0.12);
        }
        .settings-row {
            width: 100%;
            border: 0;
            border-bottom: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 16px;
            cursor: pointer;
            text-decoration: none;
            text-align: left;
            font-size: 0.98rem;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .settings-row:hover {
            background: var(--accent-bg-08);
        }
        .settings-row:last-child {
            border-bottom: 0;
        }
        .settings-row-left {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .settings-row-right {
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .settings-row .svg-icon {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .settings-user-plan-icon .svg-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .settings-user-more .svg-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .settings-back .svg-icon {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .settings-value {
            color: var(--text-secondary);
            max-width: 160px;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        .settings-chevron {
            font-size: 12px;
            transition: transform 0.2s ease, color 0.2s ease;
        }
        .settings-picker-trigger.open {
            background: var(--accent-bg-10);
        }
        .settings-picker-trigger.open .settings-chevron {
            transform: rotate(180deg);
            color: var(--purple-glow);
        }
        .settings-color-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-top: 1px solid var(--border-color);
        }
        .settings-colors {
            display: flex;
            gap: 10px;
        }
        .settings-color-row .color-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .settings-color-row .color-btn:hover {
            transform: scale(1.1);
        }
        .settings-danger {
            color: #ef4444;
        }
        .settings-danger .svg-icon {
            color: #ef4444;
        }
        .settings-footer-note {
            margin-top: 18px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.86rem;
        }
        .settings-picker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 8, 12, 0.45);
            backdrop-filter: blur(2px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1200;
        }
        .settings-picker-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .settings-picker {
            position: fixed;
            min-width: 250px;
            max-width: min(360px, calc(100vw - 20px));
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 14px 40px rgba(0,0,0,0.34);
            opacity: 0;
            transform: translateY(6px);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 1210;
        }
        .settings-picker.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .settings-picker-title {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.83rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .settings-picker-option {
            width: 100%;
            border: 0;
            background: transparent;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .settings-picker-option:hover {
            background: var(--accent-bg-08);
        }
        .settings-picker-option.active {
            color: var(--purple-glow);
            background: var(--accent-bg-10);
        }
        .settings-picker-check {
            opacity: 0;
        }
        .settings-picker-option.active .settings-picker-check {
            opacity: 1;
        }
        @media (max-width: 768px) {
            .settings-shell {
                max-width: 100%;
            }
            .settings-picker {
                left: 12px !important;
                right: 12px !important;
                bottom: 12px !important;
                top: auto !important;
                max-width: none;
                min-width: 0;
                border-radius: 16px;
                transform: translateY(16px);
            }
        }
    </style>
</head>
<body>
    <main class="settings-page">
        <div class="settings-shell">
            <header class="settings-header">
                <button class="settings-back" id="settingsBackBtn" aria-label="Back">
                    <svg class="svg-icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <h1 class="settings-title" id="settingsTitle">Settings</h1>
            </header>

            <section class="settings-user">
                <div class="settings-avatar" id="settingsAvatar"></div>
                <div class="settings-user-name" id="settingsUserName">Guest</div>
                <div class="settings-user-plan-icon" id="settingsUserPlanIcon" style="display: flex; align-items: center; justify-content: center; width: 24px; height: 24px;"></div>
            </section>

            <div class="settings-block-title" id="settingsAppTitle">Application</div>
            <section class="settings-card">
                <button class="settings-row settings-picker-trigger" id="settingsLanguageToggle" type="button" data-setting="lang">
                    <div class="settings-row-left">
                        <svg class="svg-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        <span id="languageLabel">Language</span>
                    </div>
                    <div class="settings-row-right">
                        <span id="settingsLanguageValue" class="settings-value">English</span>
                        <span class="settings-chevron">▼</span>
                    </div>
                </button>

                <button class="settings-row settings-picker-trigger" id="settingsThemeToggle" type="button" data-setting="theme">
                    <div class="settings-row-left">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        <span id="themeLabel">Theme</span>
                    </div>
                    <div class="settings-row-right">
                        <span id="settingsThemeValue" class="settings-value">Dark</span>
                        <span class="settings-chevron">▼</span>
                    </div>
                </button>

                <button class="settings-row settings-picker-trigger" id="settingsFontToggle" type="button" data-setting="font">
                    <div class="settings-row-left">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M4 7V4h16v3"></path><path d="M9 20h6"></path><path d="M12 4v16"></path></svg>
                        <span id="fontSizeLabel">Font size</span>
                    </div>
                    <div class="settings-row-right">
                        <span id="settingsFontValue" class="settings-value">Medium</span>
                        <span class="settings-chevron">▼</span>
                    </div>
                </button>
                <div class="settings-color-row">
                    <span id="accentLabel">Accent color</span>
                    <div class="settings-colors">
                        <button class="color-btn" data-color="default" style="background:#8b5cf6;" aria-label="Default"></button>
                        <button class="color-btn" data-color="blue" style="background:#3b82f6;" aria-label="Blue"></button>
                        <button class="color-btn" data-color="green" style="background:#10b981;" aria-label="Green"></button>
                        <button class="color-btn" data-color="rose" style="background:#f43f5e;" aria-label="Rose"></button>
                    </div>
                </div>
            </section>

            <div class="settings-block-title" id="settingsAboutTitle">About</div>
            <section class="settings-card">
                <a href="privacy.html" class="settings-row">
                    <div class="settings-row-left">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2l8 4v6c0 5-3.4 9.7-8 11-4.6-1.3-8-6-8-11V6l8-4z"></path></svg>
                        <span id="privacyLabel">Privacy Policy</span>
                    </div>
                    <div class="settings-row-right">›</div>
                </a>
                <a href="terms.html" class="settings-row">
                    <div class="settings-row-left">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"></path><line x1="8" y1="9" x2="16" y2="9"></line><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="13" y2="17"></line></svg>
                        <span id="termsLabel">Terms of Use</span>
                    </div>
                    <div class="settings-row-right">›</div>
                </a>
            </section>

            <section class="settings-card" style="margin-top: 14px;">
                <a href="https://t.me/vwirex" target="_blank" class="settings-row">
                    <div class="settings-row-left">
                        <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                        <span id="helpLabel">Help & Feedback</span>
                    </div>
                    <div class="settings-row-right">›</div>
                </a>
                <a href="pricing.html" class="settings-row">
                    <div class="settings-row-left">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 1v22"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        <span id="pricingLabel">Pricing</span>
                    </div>
                    <div class="settings-row-right">›</div>
                </a>
                <button class="settings-row settings-danger" id="settingsLogoutBtn" type="button">
                    <div class="settings-row-left">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        <span id="logoutLabel">Sign Out</span>
                    </div>
                    <div class="settings-row-right">›</div>
                </button>
            </section>
            <!-- Removed footer note for cleaner UI -->
        </div>
    </main>
    <div class="settings-picker-overlay" id="settingsPickerOverlay"></div>
    <div class="settings-picker" id="settingsPicker">
        <div class="settings-picker-title" id="settingsPickerTitle">Settings</div>
        <div id="settingsPickerOptions"></div>
    </div>

    <script src="auth.js?v=1"></script>
    <script src="settings.js"></script>
</body>
</html>
